<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Diario de Días</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5efe6;
    --parchment: #ede0cc;
    --ink: #2c1f14;
    --ink-light: #5a3e2b;
    --amber: #c8853a;
    --amber-light: #e8a85a;
    --star-on: #d4813a;
    --star-off: #d4c4b0;
    --shadow: rgba(44, 31, 20, 0.15);
    --red-bad: #c0392b;
    --orange-ok: #e67e22;
    --green-good: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #e8ddd0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(200,133,58,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(200,133,58,0.06) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a08060' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Lora', Georgia, serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--amber);
    font-style: italic;
  }

  header p {
    font-size: 0.95rem;
    color: var(--ink-light);
    margin-top: 8px;
    font-style: italic;
    letter-spacing: 0.03em;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px auto 0;
    width: 200px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--amber);
    opacity: 0.5;
  }
  .divider span { color: var(--amber); font-size: 1rem; }

  .main-card {
    background: var(--cream);
    border-radius: 4px;
    box-shadow:
      0 2px 4px var(--shadow),
      0 8px 32px var(--shadow),
      inset 0 0 0 1px rgba(200,133,58,0.12);
    padding: 40px 44px 44px;
    width: 100%;
    max-width: 620px;
    position: relative;
    overflow: hidden;
  }

  .main-card::before {
    content: '';
    position: absolute;
    left: 52px;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(192,100,80,0.2);
  }

  .main-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 12px;
    height: 100%;
    background: var(--parchment);
    border-right: 1px solid rgba(200,133,58,0.25);
  }

  .field-group {
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }

  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .date-row select,
  input[type="number"] {
    width: 100%;
    background: var(--parchment);
    border: 1px solid rgba(200,133,58,0.3);
    border-radius: 3px;
    padding: 10px 14px;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    color: var(--ink);
    appearance: none;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .date-row select:focus,
  input[type="number"]:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(200,133,58,0.12);
  }

  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--amber);
    pointer-events: none;
    font-size: 0.85rem;
  }

  /* STARS */
  .stars-container {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 2rem;
    line-height: 1;
    color: var(--star-off);
    transition: color 0.15s, transform 0.15s;
    padding: 2px;
  }
  .star-btn:hover,
  .star-btn.active {
    color: var(--star-on);
  }
  .star-btn:hover { transform: scale(1.2); }

  .rating-label {
    margin-top: 10px;
    font-size: 0.88rem;
    font-style: italic;
    color: var(--ink-light);
    min-height: 20px;
    transition: color 0.3s;
  }

  /* MOOD BAR */
  .mood-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--star-off);
    margin-top: 12px;
    overflow: hidden;
  }
  .mood-bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 0.4s cubic-bezier(.34,1.56,.64,1), background 0.4s;
  }

  /* TEXTAREA */
  textarea {
    width: 100%;
    min-height: 150px;
    background: var(--parchment);
    border: 1px solid rgba(200,133,58,0.3);
    border-radius: 3px;
    padding: 14px 16px;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    color: var(--ink);
    line-height: 1.8;
    resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  textarea:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(200,133,58,0.12);
  }
  textarea::placeholder { color: #b09a82; font-style: italic; }

  /* CHAR COUNT */
  .char-count {
    text-align: right;
    font-size: 0.78rem;
    color: #b09a82;
    margin-top: 5px;
  }

  /* SAVE BUTTON */
  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 12px var(--shadow);
    margin-top: 6px;
  }
  .save-btn:hover {
    background: var(--amber);
    color: var(--ink);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(200,133,58,0.3);
  }
  .save-btn:active { transform: translateY(0); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--cream);
    padding: 12px 28px;
    border-radius: 3px;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    font-style: italic;
    box-shadow: 0 8px 24px var(--shadow);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ENTRIES LIST */
  .entries-section {
    width: 100%;
    max-width: 620px;
    margin-top: 40px;
  }

  .entries-header {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(200,133,58,0.3);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .entries-header span { color: var(--amber); }

  .entry-card {
    background: var(--cream);
    border-radius: 3px;
    padding: 20px 24px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px var(--shadow);
    border-left: 3px solid var(--amber);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-card:hover { transform: translateX(3px); box-shadow: 0 4px 16px var(--shadow); }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .entry-date {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
  }

  .entry-stars {
    font-size: 0.95rem;
    color: var(--star-on);
    letter-spacing: 1px;
  }

  .entry-score {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--amber);
    margin-left: 6px;
  }

  .entry-text {
    font-size: 0.88rem;
    color: var(--ink-light);
    line-height: 1.7;
    font-style: italic;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .entry-delete {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: #c9b8a4;
    font-size: 0.85rem;
    padding: 4px;
    transition: color 0.2s;
    opacity: 0;
  }
  .entry-card:hover .entry-delete { opacity: 1; }
  .entry-delete:hover { color: var(--red-bad); }

  .no-entries {
    text-align: center;
    color: var(--ink-light);
    font-style: italic;
    font-size: 0.95rem;
    padding: 30px 0;
    opacity: 0.7;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,31,20,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--cream);
    border-radius: 4px;
    padding: 36px 40px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(44,31,20,0.3);
    animation: modalIn 0.35s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-date {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .modal-rating {
    font-size: 1.3rem;
    color: var(--star-on);
    margin-bottom: 4px;
  }
  .modal-score-label {
    font-size: 0.85rem;
    color: var(--amber);
    font-weight: 700;
    margin-bottom: 20px;
    font-style: italic;
  }
  .modal-text {
    font-size: 0.95rem;
    color: var(--ink);
    line-height: 1.85;
    white-space: pre-wrap;
    background: var(--parchment);
    border-radius: 3px;
    padding: 16px 18px;
    border-left: 2px solid var(--amber);
    max-height: 300px;
    overflow-y: auto;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.3rem;
    color: var(--ink-light);
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--ink); }
</style>
</head>
<body>

<header>
  <h1>Mi <span>Diario</span> de Días</h1>
  <p>Cada día tiene su propia historia</p>
  <div class="divider"><span>✦</span></div>
</header>

<div class="main-card">

  <!-- FECHA -->
  <div class="field-group">
    <label>Fecha del Día</label>
    <div class="date-row">
      <div class="select-wrap">
        <select id="sel-day"></select>
      </div>
      <div class="select-wrap">
        <select id="sel-month"></select>
      </div>
      <input type="number" id="inp-year" min="2000" max="2099" placeholder="Año">
    </div>
  </div>

  <!-- ESTRELLAS -->
  <div class="field-group">
    <label>Calificación del Día</label>
    <div class="stars-container" id="stars"></div>
    <div class="mood-bar"><div class="mood-bar-fill" id="mood-fill"></div></div>
    <div class="rating-label" id="rating-label">Selecciona cuántas estrellas merece este día</div>
  </div>

  <!-- RESUMEN -->
  <div class="field-group">
    <label>¿Cómo fue tu día?</label>
    <textarea id="summary" maxlength="600" placeholder="Escribe aquí tu resumen del día, lo que sentiste, lo que viviste, lo que aprendiste..."></textarea>
    <div class="char-count"><span id="char-current">0</span> / 600</div>
  </div>

  <button class="save-btn" onclick="saveEntry()">✦ Guardar este día</button>
</div>

<!-- ENTRADAS -->
<div class="entries-section">
  <div class="entries-header">
    <span>✦</span> Días guardados
  </div>
  <div id="entries-list"></div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div class="modal-date" id="m-date"></div>
    <div class="modal-rating" id="m-stars"></div>
    <div class="modal-score-label" id="m-score"></div>
    <div class="modal-text" id="m-text"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const LABELS = ['','😞 Un día muy difícil','😕 No fue el mejor','😐 Podría ser peor','🙂 Más o menos bien','😊 Un día bastante bueno','😄 Buen día','🌟 Muy buen día','✨ Día increíble','🔥 ¡Casi perfecto!','💫 ¡Día perfecto!'];
const COLORS = ['','#c0392b','#c0392b','#e67e22','#e67e22','#f39c12','#27ae60','#27ae60','#2980b9','#8e44ad','#d4813a'];

let currentRating = 0;
let entries = [];

// Init date selects
const today = new Date();
const selDay = document.getElementById('sel-day');
const selMonth = document.getElementById('sel-month');
const inpYear = document.getElementById('inp-year');

for (let d = 1; d <= 31; d++) {
  const o = document.createElement('option');
  o.value = d; o.textContent = d;
  if (d === today.getDate()) o.selected = true;
  selDay.appendChild(o);
}

MONTHS.forEach((m, i) => {
  const o = document.createElement('option');
  o.value = i + 1; o.textContent = m;
  if (i === today.getMonth()) o.selected = true;
  selMonth.appendChild(o);
});

inpYear.value = today.getFullYear();

// Stars
const starsEl = document.getElementById('stars');
for (let i = 1; i <= 10; i++) {
  const btn = document.createElement('button');
  btn.className = 'star-btn';
  btn.textContent = '★';
  btn.setAttribute('aria-label', `${i} estrella${i>1?'s':''}`);
  btn.dataset.val = i;
  btn.addEventListener('mouseover', () => highlightStars(i));
  btn.addEventListener('mouseleave', () => highlightStars(currentRating));
  btn.addEventListener('click', () => { currentRating = i; highlightStars(i); updateRatingLabel(i); });
  starsEl.appendChild(btn);
}

function highlightStars(n) {
  document.querySelectorAll('.star-btn').forEach((b, idx) => {
    b.classList.toggle('active', idx < n);
  });
}

function updateRatingLabel(n) {
  const lbl = document.getElementById('rating-label');
  const fill = document.getElementById('mood-fill');
  lbl.textContent = LABELS[n];
  lbl.style.color = COLORS[n];
  fill.style.width = (n * 10) + '%';
  fill.style.background = COLORS[n];
}

// Textarea char count
document.getElementById('summary').addEventListener('input', function() {
  document.getElementById('char-current').textContent = this.value.length;
});

// Load from localStorage
function loadEntries() {
  try { entries = JSON.parse(localStorage.getItem('diary_entries') || '[]'); } catch { entries = []; }
  renderEntries();
}

function saveToStorage() {
  localStorage.setItem('diary_entries', JSON.stringify(entries));
}

function saveEntry() {
  const day = parseInt(selDay.value);
  const month = parseInt(selMonth.value);
  const year = parseInt(inpYear.value);
  const text = document.getElementById('summary').value.trim();

  if (!year || year < 2000 || year > 2099) { showToast('⚠ Por favor ingresa un año válido'); return; }
  if (!currentRating) { showToast('⚠ Elige cuántas estrellas merece tu día'); return; }
  if (!text) { showToast('⚠ Escribe algo sobre tu día'); return; }

  const entry = {
    id: Date.now(),
    day, month, year,
    rating: currentRating,
    text,
    dateStr: `${day} de ${MONTHS[month-1]} ${year}`
  };

  // Check duplicate
  const dup = entries.findIndex(e => e.day===day && e.month===month && e.year===year);
  if (dup >= 0) {
    entries[dup] = entry;
    showToast('✓ Día actualizado exitosamente');
  } else {
    entries.unshift(entry);
    showToast('✦ Día guardado con éxito');
  }

  saveToStorage();
  renderEntries();
  resetForm();
}

function resetForm() {
  currentRating = 0;
  highlightStars(0);
  document.getElementById('rating-label').textContent = 'Selecciona cuántas estrellas merece este día';
  document.getElementById('rating-label').style.color = '';
  document.getElementById('mood-fill').style.width = '0%';
  document.getElementById('summary').value = '';
  document.getElementById('char-current').textContent = '0';
}

function renderEntries() {
  const list = document.getElementById('entries-list');
  if (!entries.length) {
    list.innerHTML = '<div class="no-entries">Aún no has guardado ningún día. ¡Empieza hoy!</div>';
    return;
  }

  const sorted = [...entries].sort((a,b) => {
    const da = new Date(a.year, a.month-1, a.day);
    const db = new Date(b.year, b.month-1, b.day);
    return db - da;
  });

  list.innerHTML = sorted.map(e => `
    <div class="entry-card" onclick="openModal(${e.id})">
      <button class="entry-delete" onclick="deleteEntry(event,${e.id})" title="Eliminar">✕</button>
      <div class="entry-top">
        <div class="entry-date">${e.dateStr}</div>
        <div>
          <span class="entry-stars">${'★'.repeat(e.rating)}${'☆'.repeat(10-e.rating)}</span>
          <span class="entry-score">${e.rating}/10</span>
        </div>
      </div>
      <div class="entry-text">${e.text}</div>
    </div>
  `).join('');
}

function openModal(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('m-date').textContent = e.dateStr;
  document.getElementById('m-stars').textContent = '★'.repeat(e.rating) + '☆'.repeat(10 - e.rating);
  document.getElementById('m-score').textContent = `${e.rating}/10 — ${LABELS[e.rating]}`;
  document.getElementById('m-text').textContent = e.text;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}

function deleteEntry(e, id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar este día de tu diario?')) return;
  entries = entries.filter(x => x.id !== id);
  saveToStorage();
  renderEntries();
  showToast('Día eliminado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

loadEntries();
</script>
</body>
</html>
